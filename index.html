Aşağıda, tarayıcının varsayılan uyarı kutucukları yerine özel bir model penceresi kullanan güncellenmiş kod bulunmaktadır. Bu değişiklik, oyun deneyimini daha bütünleşik hale getirecektir.

```html
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinek Valesi: Online</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0a0a0a; --card-red: #ff4d4d; --card-white: #e0e0e0; }
        body { background-color: var(--bg); color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 600px; text-align: center; border: 2px solid #333; padding: 20px; border-radius: 10px; background: #111; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
        .log { height: 120px; overflow-y: auto; background: #000; padding: 10px; text-align: left; font-size: 0.8rem; border: 1px dashed #555; margin: 10px 0; }
        .hidden { display: none; }
        input { padding: 10px; background: #222; border: 1px solid #444; color: white; margin-bottom: 10px; width: 80%; }
        button { padding: 10px 20px; background: #8b0000; color: white; border: none; cursor: pointer; font-weight: bold; margin: 5px; border-radius: 5px; } /* Added border-radius */
        button:disabled { background: #444; cursor: not-allowed; }
        .player-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 15px 0; }
        .player-node { border: 2px solid red; border-radius: 50%; width: 70px; height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; background: #1a1a1a; position: relative; }
        .player-node.ready { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .player-node span { font-size: 1.8rem; font-weight: bold; }
        .player-node small { font-size: 0.7rem; margin-top: 2px; color: #aaa; overflow: hidden; text-overflow: ellipsis; width: 60px; }
        .symbols-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        
        /* Bildirim Paneli */
        #interaction-panel { background: #1a1a1a; border: 2px solid cyan; padding: 15px; border-radius: 10px; margin-top: 15px; position: fixed; top: 20px; width: 300px; z-index: 100; box-shadow: 0 0 20px cyan; }

        /* Yeni: Özel Uyarı Modalı */
        #custom-alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000; /* Ensures it's above everything else */
        }
        #custom-alert-box {
            background: #1a1a1a;
            border: 2px solid var(--card-red);
            padding: 20px;
            border-radius: 10px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            animation: fadeIn 0.3s ease-out; /* Simple fade-in animation */
        }
        #custom-alert-box h3 {
            color: var(--card-red);
            margin-top: 0;
            font-size: 1.5rem;
        }
        #custom-alert-box p {
            margin-bottom: 20px;
            font-size: 1rem;
            line-height: 1.4;
        }
        #custom-alert-confirm-btn {
            background: #8b0000;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 5px;
            transition: background 0.2s ease;
        }
        #custom-alert-confirm-btn:hover {
            background: #b30000;
        }

        /* Fade-in animation for modal */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h2>SİNEK VALESİ: ONLINE</h2>
        
        <div id="login-screen">
            <input type="text" id="username" placeholder="Adını yaz...">
            <button onclick="joinGame()">OYUNA KATIL</button>
        </div>

        <div id="game-screen" class="hidden">
            <div id="status">Lobi: Hazırlanıyor...</div>
            <div class="player-list" id="player-list"></div>
            <div class="log" id="game-log"></div>
            
            <div id="action-zone">
                <button id="ready-btn" onclick="setReady()">HAZIRIM</button>
                <div id="guess-zone" class="hidden">
                    <p style="color: cyan; font-weight: bold;">Ensendeki sembolü tahmin et:</p>
                    <div class="symbols-grid">
                        <button onclick="makeGuess('♠')">♠</button>
                        <button style="color:red" onclick="makeGuess('♥')">♥</button>
                        <button style="color:red" onclick="makeGuess('♦')">♦</button>
                        <button onclick="makeGuess('♣')">♣</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="interaction-panel" class="hidden">
        <p id="question-text"></p>
        <div class="symbols-grid">
            <button onclick="answerQuestion('♠')">♠</button>
            <button style="color:red" onclick="answerQuestion('♥')">♥</button>
            <button style="color:red" onclick="answerQuestion('♦')">♦</button>
            <button onclick="answerQuestion('♣')">♣</button>
        </div>
    </div>

    <!-- Özel Uyarı Modalı -->
    <div id="custom-alert-overlay" class="hidden">
        <div id="custom-alert-box">
            <h3 id="custom-alert-title"></h3>
            <p id="custom-alert-message"></p>
            <button id="custom-alert-confirm-btn">Tamam</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDFfKM09beGbtknlKBlwTYr6V21S_rwZ7c",
            authDomain: "sinek-valesi-online.firebaseapp.com",
            projectId: "sinek-valesi-online",
            databaseURL: "https://sinek-valesi-online-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "sinek-valesi-online.appspot.com",
            messagingSenderId: "361261148085",
            appId: "1:361261148085:web:817677efcf47aa0d551bfc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let myId = "";
        let myName = "";
        let isGlobalStarted = false;
        let currentRequestId = ""; 
        const allSymbols = ['♠', '♥', '♦', '♣'];

        // --- Özel Uyarı Modalı Fonksiyonları ---
        let onAlertConfirmCallback = null;

        function showCustomAlert(title, message, confirmCallback = null) {
            document.getElementById('custom-alert-title').innerText = title;
            document.getElementById('custom-alert-message').innerText = message;
            document.getElementById('custom-alert-overlay').classList.remove('hidden');
            onAlertConfirmCallback = confirmCallback; // Callback'i sakla
        }

        function hideCustomAlert() {
            document.getElementById('custom-alert-overlay').classList.add('hidden');
            if (onAlertConfirmCallback) {
                onAlertConfirmCallback(); // Callback'i çalıştır
                onAlertConfirmCallback = null; // Callback'i temizle
            }
        }

        // --- Sayfa yüklendiğinde "Tamam" butonuna olay dinleyici ekle ---
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('custom-alert-confirm-btn').onclick = hideCustomAlert;
        });
        // --- Özel Uyarı Modalı Fonksiyonları Sonu ---


        function joinGame() {
            myName = document.getElementById('username').value;
            if(!myName) {
                showCustomAlert("Hata!", "İsminizi boş bırakamazsınız."); // alert yerine
                return;
            }
            const newPlayerRef = db.ref('players').push();
            myId = newPlayerRef.key;
            newPlayerRef.set({ name: myName, ready: false, symbol: "", status: "alive" });
            newPlayerRef.onDisconnect().remove();
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            listenGame();
            listenInteractions(); // Bildirimleri dinlemeye başla
        }

        function listenGame() {
            db.ref('gameState').on('value', (snap) => {
                isGlobalStarted = snap.val() || false;
                const statusEl = document.getElementById('status');
                if (isGlobalStarted) {
                    statusEl.innerText = "OYUN BAŞLADI!";
                    document.getElementById('ready-btn').classList.add('hidden');
                    document.getElementById('guess-zone').classList.remove('hidden');
                    checkAndAssignMySymbol();
                } else {
                    statusEl.innerText = "Lobi: Hazırlanıyor...";
                    document.getElementById('guess-zone').classList.add('hidden');
                    document.getElementById('ready-btn').classList.remove('hidden');
                }
            });

            db.ref('players').on('value', (snapshot) => {
                const players = snapshot.val() || {};
                const listDiv = document.getElementById('player-list');
                listDiv.innerHTML = '';
                let playerIds = Object.keys(players);
                let readyCount = 0;
                for(let id in players) if(players[id].ready) readyCount++;

                for(let id in players) {
                    const p = players[id];
                    const div = document.createElement('div');
                    div.className = `player-node ${p.ready ? 'ready' : ''}`;
                    if(isGlobalStarted) {
                        div.innerHTML = `<span>${id !== myId ? (p.symbol || "⌛") : "?"}</span><small>${p.name}</small>`;
                        if(id !== myId) div.onclick = () => askSymbol(id, p.name);
                    } else {
                        div.innerHTML = `<span>${p.name[0].toUpperCase()}</span><small>${p.name}</small>`;
                    }
                    listDiv.appendChild(div);
                }

                if (!isGlobalStarted && playerIds.length >= 2 && readyCount === playerIds.length && playerIds[0] === myId) {
                    db.ref('gameState').set(true);
                }
            });
        }

        // 1. SORU SORMA: Rakibe tıklandığında çalışır
        function askSymbol(targetId, targetName) {
            updateLog(`${targetName} kişisine ensesindeki sembol soruluyor...`);
            db.ref('interactions/' + targetId).set({
                fromId: myId,
                fromName: myName,
                type: "question",
                timestamp: Date.now()
            });
        }

        // 2. ETKİLEŞİMLERİ DİNLEME: Bana soru soruldu mu?
        function listenInteractions() {
            db.ref('interactions/' + myId).on('value', (snap) => {
                const data = snap.val();
                if(!data) {
                    document.getElementById('interaction-panel').classList.add('hidden');
                    return;
                }

                if(data.type === "question") {
                    document.getElementById('question-text').innerText = `${data.fromName} sana ensende ne olduğunu soruyor!`;
                    document.getElementById('interaction-panel').classList.remove('hidden');
                    currentRequestId = data.fromId;
                } else if(data.type === "answer") {
                    // Sorduğum sorunun cevabı geldi
                    showCustomAlert("Cevap Geldi!", `${data.fromName} diyor ki: "Ensendeki sembol ${data.choice}"`); // alert yerine
                    updateLog(`${data.fromName} cevapladı: ${data.choice}`);
                    db.ref('interactions/' + myId).remove(); // Mesajı temizle
                }
            });
        }

        // 3. CEVAP VERME: Panelden bir sembol seçildiğinde
        function answerQuestion(choice) {
            if(!currentRequestId) return;
            // Cevabı soruyu soran kişiye gönder
            db.ref('interactions/' + currentRequestId).set({
                fromId: myId,
                fromName: myName,
                type: "answer",
                choice: choice,
                timestamp: Date.now()
            });
            // Kendi panelimi kapat
            db.ref('interactions/' + myId).remove();
            document.getElementById('interaction-panel').classList.add('hidden');
        }

        function checkAndAssignMySymbol() {
            db.ref('players/' + myId + '/symbol').once('value', snap => {
                if(!snap.val()) {
                    const randomSymbol = allSymbols[Math.floor(Math.random() * allSymbols.length)];
                    db.ref('players/' + myId).update({ symbol: randomSymbol });
                }
            });
        }

        function setReady() {
            db.ref('players/' + myId).update({ ready: true });
            document.getElementById('ready-btn').disabled = true;
            document.getElementById('ready-btn').innerText = "Bekleniyor...";
        }

        function makeGuess(guess) {
            db.ref('players/' + myId + '/symbol').once('value', snap => {
                const realSymbol = snap.val();
                if(realSymbol === guess) {
                    showCustomAlert("TEBRİKLER!", "Doğru tahmin ettin!", () => { // alert yerine, callback ile devam et
                        db.ref('gameState').set(false);
                        db.ref('interactions').remove(); // Tüm konuşmaları temizle
                        db.ref('players').once('value', s => {
                            for(let id in s.val()) db.ref('players/' + id).update({ ready: false, symbol: "" });
                        });
                    });
                } else {
                    showCustomAlert("Oyun Bitti!", `ELENDİN! Ensendeki sembol: ${realSymbol}`, () => { // alert yerine, callback ile devam et
                        db.ref('players/' + myId).remove();
                        location.reload();
                    });
                }
            });
        }

        function updateLog(msg) {
            const log = document.getElementById('game-log');
            if(log) {
                log.innerHTML += `<p>> ${msg}</p>`;
                log.scrollTop = log.scrollHeight;
            }
        }
    </script>
</body>
</html>
```
