<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinek Valesi: Online</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0a0a0a; --card-red: #ff4d4d; --card-white: #e0e0e0; }
        body { background-color: var(--bg); color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 600px; text-align: center; border: 2px solid #333; padding: 20px; border-radius: 10px; background: #111; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
        .log { height: 150px; overflow-y: auto; background: #000; padding: 10px; text-align: left; font-size: 0.9rem; border: 1px dashed #555; margin: 15px 0; }
        .hidden { display: none; }
        input { padding: 10px; background: #222; border: 1px solid #444; color: white; margin-bottom: 10px; width: 80%; }
        button { padding: 10px 20px; background: #8b0000; color: white; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        button:disabled { background: #444; cursor: not-allowed; }
        .player-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 15px 0; }
        .player-node { border: 2px solid red; border-radius: 50%; width: 60px; height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; background: #1a1a1a; }
        .player-node.ready { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .player-node span { font-size: 1.5rem; font-weight: bold; }
        .player-node small { font-size: 0.6rem; margin-top: 2px; }
        .symbols-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="game-container">
        <h2>SİNEK VALESİ: ONLINE</h2>
        
        <div id="login-screen">
            <input type="text" id="username" placeholder="Adını yaz...">
            <button onclick="joinGame()">OYUNA KATIL</button>
        </div>

        <div id="game-screen" class="hidden">
            <div id="status">Lobi: Diğer oyuncular bekleniyor...</div>
            <div class="player-list" id="player-list"></div>
            <div class="log" id="game-log"></div>
            
            <div id="action-zone">
                <button id="ready-btn" onclick="setReady()">HAZIRIM</button>
                
                <div id="guess-zone" class="hidden">
                    <p style="color: cyan; font-weight: bold;">OYUN BAŞLADI! Ensendeki sembolü tahmin et:</p>
                    <div class="symbols-grid">
                        <button onclick="makeGuess('♠')">♠</button>
                        <button style="color:red" onclick="makeGuess('♥')">♥</button>
                        <button style="color:red" onclick="makeGuess('♦')">♦</button>
                        <button onclick="makeGuess('♣')">♣</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDFfKM09beGbtknlKBlwTYr6V21S_rwZ7c",
            authDomain: "sinek-valesi-online.firebaseapp.com",
            projectId: "sinek-valesi-online",
            databaseURL: "https://sinek-valesi-online-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "sinek-valesi-online.appspot.com",
            messagingSenderId: "361261148085",
            appId: "1:361261148085:web:817677efcf47aa0d551bfc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let myId = "";
        let myName = "";
        let gameStarted = false;
        const allSymbols = ['♠', '♥', '♦', '♣'];

        function joinGame() {
            myName = document.getElementById('username').value;
            if(!myName) return alert("İsim yaz!");
            
            const newPlayerRef = db.ref('players').push();
            myId = newPlayerRef.key;
            
            newPlayerRef.set({
                name: myName,
                ready: false,
                symbol: "",
                status: "alive"
            });

            newPlayerRef.onDisconnect().remove();
            
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            listenPlayers();
        }

        function listenPlayers() {
            db.ref('players').on('value', (snapshot) => {
                const players = snapshot.val();
                const listDiv = document.getElementById('player-list');
                listDiv.innerHTML = '';
                
                let totalCount = 0;
                let readyCount = 0;

                for(let id in players) {
                    const p = players[id];
                    totalCount++;
                    if(p.ready) readyCount++;

                    const div = document.createElement('div');
                    div.className = `player-node ${p.ready ? 'ready' : ''}`;
                    
                    // DÜZENLEME: Oyun başladıysa ve başkasıysa sembolü göster
                    if(gameStarted && id !== myId && p.symbol) {
                        div.innerHTML = `<span>${p.symbol}</span><small>${p.name}</small>`;
                        div.onclick = () => whisperAction(p.name, p.symbol);
                    } else {
                        div.innerHTML = `<span>${p.name[0].toUpperCase()}</span><small>${p.name}</small>`;
                    }

                    listDiv.appendChild(div);
                }

                if (!gameStarted && totalCount >= 2 && readyCount === totalCount) {
                    startGame();
                } else if (!gameStarted) {
                    document.getElementById('status').innerText = `Lobi: ${readyCount}/${totalCount} Oyuncu Hazır`;
                }
            });
        }

        function whisperAction(targetName, targetSymbol) {
            // Blöf mekanizması: %70 doğru, %30 yalan
            const isLying = Math.random() < 0.3;
            let spokenSymbol;

            if (isLying) {
                // Yalan söylüyorsa gerçek sembol dışındaki sembollerden birini seç
                const otherSymbols = allSymbols.filter(s => s !== targetSymbol);
                spokenSymbol = otherSymbols[Math.floor(Math.random() * otherSymbols.length)];
            } else {
                // Doğruyu söylüyorsa (Kendi gördüğü, senin ensendeki sembolü söyler)
                // Mantık: Diğer oyuncu sana tıkladığında, sistem senin gerçek sembolünü ona söyletir.
                db.ref('players/' + myId).once('value').then(snap => {
                    const myRealSymbol = snap.val().symbol;
                    alert(`${targetName} sana fısıldıyor: "Senin ensende ${myRealSymbol} var!"`);
                    updateLog(`${targetName} fısıldadı: "Ensendeki ${myRealSymbol}"`);
                });
                return;
            }

            alert(`${targetName} sana fısıldıyor: "Senin ensende ${spokenSymbol} var!"`);
            updateLog(`${targetName} fısıldadı: "Ensendeki ${spokenSymbol}"`);
        }

        function setReady() {
            db.ref('players/' + myId).update({ ready: true });
            document.getElementById('ready-btn').disabled = true;
            document.getElementById('ready-btn').innerText = "Bekleniyor...";
        }

        function startGame() {
            gameStarted = true;
            const randomSymbol = allSymbols[Math.floor(Math.random() * allSymbols.length)];
            
            db.ref('players/' + myId).update({ symbol: randomSymbol });

            document.getElementById('status').innerText = "OYUN BAŞLADI!";
            document.getElementById('ready-btn').classList.add('hidden');
            document.getElementById('guess-zone').classList.remove('hidden');
            updateLog("Oyun başladı! Diğerlerinin ensesindeki işaretler açıldı.");
        }

        function makeGuess(guess) {
            db.ref('players/' + myId).once('value').then(snap => {
                if(snap.val().symbol === guess) {
                    alert("DOĞRU! Yaşamaya hak kazandın.");
                    location.reload(); 
                } else {
                    alert(`YANLIŞ! Ensendeki sembol ${snap.val().symbol} idi. Elendin!`);
                    db.ref('players/' + myId).remove();
                    location.reload();
                }
            });
        }

        function updateLog(msg) {
            const log = document.getElementById('game-log');
            log.innerHTML += `<p>> ${msg}</p>`;
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
