<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinek Valesi: Online</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0a0a0a; --card-red: #ff4d4d; --card-white: #e0e0e0; }
        body { background-color: var(--bg); color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        #game-container { width: 90%; max-width: 600px; text-align: center; border: 2px solid #333; padding: 20px; border-radius: 10px; background: #111; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); }
        .log { height: 150px; overflow-y: auto; background: #000; padding: 10px; text-align: left; font-size: 0.9rem; border: 1px dashed #555; margin: 15px 0; }
        .hidden { display: none; }
        input { padding: 10px; background: #222; border: 1px solid #444; color: white; margin-bottom: 10px; width: 80%; }
        button { padding: 10px 20px; background: #8b0000; color: white; border: none; cursor: pointer; font-weight: bold; margin: 5px; }
        button:disabled { background: #444; cursor: not-allowed; }
        .player-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 15px 0; }
        .player-node { border: 2px solid red; border-radius: 50%; width: 70px; height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; background: #1a1a1a; }
        .player-node.ready { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .player-node span { font-size: 1.8rem; font-weight: bold; }
        .player-node small { font-size: 0.7rem; margin-top: 2px; color: #aaa; }
        .symbols-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="game-container">
        <h2>SİNEK VALESİ: ONLINE</h2>
        
        <div id="login-screen">
            <input type="text" id="username" placeholder="Adını yaz...">
            <button onclick="joinGame()">OYUNA KATIL</button>
        </div>

        <div id="game-screen" class="hidden">
            <div id="status">Lobi: Hazırlanıyor...</div>
            <div class="player-list" id="player-list"></div>
            <div class="log" id="game-log"></div>
            
            <div id="action-zone">
                <button id="ready-btn" onclick="setReady()">HAZIRIM</button>
                
                <div id="guess-zone" class="hidden">
                    <p style="color: cyan; font-weight: bold;">Ensendeki sembolü tahmin et:</p>
                    <div class="symbols-grid">
                        <button onclick="makeGuess('♠')">♠</button>
                        <button style="color:red" onclick="makeGuess('♥')">♥</button>
                        <button style="color:red" onclick="makeGuess('♦')">♦</button>
                        <button onclick="makeGuess('♣')">♣</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDFfKM09beGbtknlKBlwTYr6V21S_rwZ7c",
            authDomain: "sinek-valesi-online.firebaseapp.com",
            projectId: "sinek-valesi-online",
            databaseURL: "https://sinek-valesi-online-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "sinek-valesi-online.appspot.com",
            messagingSenderId: "361261148085",
            appId: "1:361261148085:web:817677efcf47aa0d551bfc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let myId = "";
        let myName = "";
        let isGlobalStarted = false;
        const allSymbols = ['♠', '♥', '♦', '♣'];

        function joinGame() {
            myName = document.getElementById('username').value;
            if(!myName) return alert("İsim yaz!");
            
            const newPlayerRef = db.ref('players').push();
            myId = newPlayerRef.key;
            
            newPlayerRef.set({
                name: myName,
                ready: false,
                symbol: "",
                status: "alive"
            });

            newPlayerRef.onDisconnect().remove();
            
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            listenGame();
        }

        function listenGame() {
            // 1. Oyun Durumunu Dinle
            db.ref('gameState').on('value', (snap) => {
                isGlobalStarted = snap.val() || false;
                const statusEl = document.getElementById('status');
                const readyBtn = document.getElementById('ready-btn');
                const guessZone = document.getElementById('guess-zone');

                if (isGlobalStarted) {
                    statusEl.innerText = "OYUN BAŞLADI!";
                    readyBtn.classList.add('hidden');
                    guessZone.classList.remove('hidden');
                } else {
                    guessZone.classList.add('hidden');
                    readyBtn.classList.remove('hidden');
                }
            });

            // 2. Oyuncuları Dinle
            db.ref('players').on('value', (snapshot) => {
                const players = snapshot.val() || {};
                const listDiv = document.getElementById('player-list');
                listDiv.innerHTML = '';
                
                let playerIds = Object.keys(players);
                let totalCount = playerIds.length;
                let readyCount = 0;

                for(let id in players) {
                    if(players[id].ready) readyCount++;
                }

                // Lider Belirleme (Odadaki ilk kişi host olur)
                const isHost = playerIds[0] === myId;

                for(let id in players) {
                    const p = players[id];
                    const div = document.createElement('div');
                    div.className = `player-node ${p.ready ? 'ready' : ''}`;
                    
                    if(isGlobalStarted && id !== myId) {
                        // Sembol henüz gelmediyse kum saati göster
                        const displaySymbol = p.symbol ? p.symbol : "⌛"; 
                        div.innerHTML = `<span>${displaySymbol}</span><small>${p.name}</small>`;
                        
                        if(p.symbol) {
                            div.onclick = () => whisperAction(p.name, p.symbol);
                        }
                    } else {
                        div.innerHTML = `<span>${p.name[0].toUpperCase()}</span><small>${p.name}</small>`;
                    }
                    listDiv.appendChild(div);
                }

                // Başlatma Koşulu: Sadece HOST başlatır ve sembolleri atar
                if (!isGlobalStarted && totalCount >= 2 && readyCount === totalCount && isHost) {
                    db.ref('gameState').set(true);
                    // Tüm oyunculara sembol ata
                    for(let id in players) {
                        const randomSymbol = allSymbols[Math.floor(Math.random() * allSymbols.length)];
                        db.ref('players/' + id).update({ symbol: randomSymbol });
                    }
                } else if (!isGlobalStarted) {
                    document.getElementById('status').innerText = `Lobi: ${readyCount}/${totalCount} Hazır`;
                }
            });
        }

        function whisperAction(targetName, targetSymbol) {
            const isLying = Math.random() < 0.3;
            db.ref('players/' + myId).once('value').then(snap => {
                const myRealSymbol = snap.val().symbol;
                let spoken;
                if(isLying) {
                    spoken = allSymbols.filter(s => s !== myRealSymbol)[Math.floor(Math.random() * 3)];
                } else {
                    spoken = myRealSymbol;
                }
                alert(`${targetName} fısıldıyor: "Senin ensende ${spoken} var!"`);
                updateLog(`${targetName} fısıldadı: "Ensendeki ${spoken}"`);
            });
        }

        function setReady() {
            db.ref('players/' + myId).update({ ready: true });
            document.getElementById('ready-btn').disabled = true;
            document.getElementById('ready-btn').innerText = "Bekle...";
        }

        function makeGuess(guess) {
            db.ref('players/' + myId).once('value').then(snap => {
                const realSymbol = snap.val().symbol;
                if(realSymbol === guess) {
                    alert("DOĞRU! Yaşamaya hak kazandın.");
                    db.ref('gameState').set(false); // Oyunu herkes için bitir
                    // Herkesi sıfırla
                    db.ref('players').once('value', s => {
                        const all = s.val();
                        for(let id in all) {
                            db.ref('players/'+id).update({ready: false, symbol: ""});
                        }
                    });
                    setTimeout(() => location.reload(), 500);
                } else {
                    alert(`YANLIŞ! Ensendeki: ${realSymbol}. Elendin!`);
                    db.ref('players/' + myId).remove();
                    location.reload();
                }
            });
        }

        function updateLog(msg) {
            const log = document.getElementById('game-log');
            if(log) {
                log.innerHTML += `<p>> ${msg}</p>`;
                log.scrollTop = log.scrollHeight;
            }
        }
    </script>
</body>
</html>
