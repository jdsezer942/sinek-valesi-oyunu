<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinek Valesi: Online</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #0a0a0a; --card-red: #ff4d4d; --neon: #ff0000; }
        body { background-color: var(--bg); color: white; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        #game-container { width: 90%; max-width: 600px; text-align: center; border: 2px solid #333; padding: 20px; border-radius: 10px; background: #111; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); z-index: 10; }
        .log { height: 100px; overflow-y: auto; background: #000; padding: 10px; text-align: left; font-size: 0.8rem; border: 1px dashed #555; margin: 10px 0; color: #00ff00; }
        .hidden { display: none !important; }
        
        input { padding: 12px; background: #222; border: 1px solid #444; color: white; width: 80%; margin-bottom: 10px; border-radius: 5px; text-align: center; }
        button { padding: 10px 20px; background: #8b0000; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #ff0000; box-shadow: 0 0 10px var(--neon); }

        .player-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px 0; }
        .player-node { border: 2px solid #444; border-radius: 50%; width: 70px; height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1a1a1a; cursor: pointer; }
        .player-node.ready { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }

        /* MODAL - TAM MERKEZ VE GÖRÜNÜR */
        #custom-alert-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
        }
        #custom-alert-box {
            background: #111; border: 2px solid var(--neon);
            padding: 30px; border-radius: 15px; width: 280px;
            text-align: center; box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }
        #custom-alert-title { color: var(--neon); margin-top: 0; font-size: 1.5rem; }
        #custom-alert-message { color: #fff; margin: 15px 0 25px 0; font-size: 1rem; line-height: 1.4; }

        /* Etkileşim Paneli */
        #interaction-panel { position: fixed; top: 20px; background: #000; border: 2px solid cyan; padding: 15px; border-radius: 10px; z-index: 1000; box-shadow: 0 0 20px cyan; }
        .symbols-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
    </style>
</head>
<body>

    <div id="game-container">
        <h2>SİNEK VALESİ: ONLINE</h2>
        
        <div id="login-screen">
            <input type="text" id="username" placeholder="İsmini Gir...">
            <button onclick="joinGame()">BAŞLA</button>
        </div>

        <div id="game-screen" class="hidden">
            <div id="status" style="color: cyan;">Lobi bekleniyor...</div>
            <div id="player-list" class="player-list"></div>
            <div id="game-log" class="log"></div>
            <div id="action-zone">
                <button id="ready-btn" onclick="setReady()">HAZIRIM</button>
                <div id="guess-zone" class="hidden">
                    <p>Ensendeki sembolü tahmin et:</p>
                    <div class="symbols-grid">
                        <button onclick="makeGuess('♠')">♠</button>
                        <button style="color:red" onclick="makeGuess('♥')">♥</button>
                        <button style="color:red" onclick="makeGuess('♦')">♦</button>
                        <button onclick="makeGuess('♣')">♣</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="interaction-panel" class="hidden">
        <p id="question-text"></p>
        <div class="symbols-grid">
            <button onclick="answerQuestion('♠')">♠</button>
            <button style="color:red" onclick="answerQuestion('♥')">♥</button>
            <button style="color:red" onclick="answerQuestion('♦')">♦</button>
            <button onclick="answerQuestion('♣')">♣</button>
        </div>
    </div>

    <div id="custom-alert-overlay" class="hidden">
        <div id="custom-alert-box">
            <h3 id="custom-alert-title">BİLGİ</h3>
            <p id="custom-alert-message"></p>
            <button onclick="closeAlert()" style="width:100%">TAMAM</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDFfKM09beGbtknlKBlwTYr6V21S_rwZ7c",
            authDomain: "sinek-valesi-online.firebaseapp.com",
            projectId: "sinek-valesi-online",
            databaseURL: "https://sinek-valesi-online-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "sinek-valesi-online.appspot.com",
            messagingSenderId: "361261148085",
            appId: "1:361261148085:web:817677efcf47aa0d551bfc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myId, myName, currentRequestId, onConfirm;

        // Modal Fonksiyonları
        function showAlert(title, msg, callback = null) {
            document.getElementById('custom-alert-title').innerText = title;
            document.getElementById('custom-alert-message').innerText = msg;
            document.getElementById('custom-alert-overlay').classList.remove('hidden');
            onConfirm = callback;
        }

        function closeAlert() {
            document.getElementById('custom-alert-overlay').classList.add('hidden');
            if(onConfirm) { onConfirm(); onConfirm = null; }
        }

        function joinGame() {
            myName = document.getElementById('username').value.trim();
            if(!myName) return showAlert("HATA", "Bir isim yazmalısın!");

            const ref = db.ref('players').push();
            myId = ref.key;
            ref.set({ name: myName, ready: false, symbol: "", status: "alive" });
            ref.onDisconnect().remove();

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            startListening();
        }

        function startListening() {
            db.ref('gameState').on('value', snap => {
                const started = snap.val();
                document.getElementById('status').innerText = started ? "OYUN BAŞLADI!" : "Lobi bekleniyor...";
                if(started) {
                    document.getElementById('ready-btn').classList.add('hidden');
                    document.getElementById('guess-zone').classList.remove('hidden');
                    assignSymbol();
                }
            });

            db.ref('players').on('value', snap => {
                const players = snap.val() || {};
                const list = document.getElementById('player-list');
                list.innerHTML = "";
                let allReady = true;
                let count = 0;

                for(let id in players) {
                    count++;
                    if(!players[id].ready) allReady = false;
                    const div = document.createElement('div');
                    div.className = `player-node ${players[id].ready ? 'ready' : ''}`;
                    div.innerHTML = `<span>${id === myId ? '?' : (players[id].symbol || '⌛')}</span><small>${players[id].name}</small>`;
                    if(id !== myId) div.onclick = () => ask(id, players[id].name);
                    list.appendChild(div);
                }
                if(count >= 2 && allReady) db.ref('gameState').set(true);
            });

            db.ref('interactions/' + myId).on('value', snap => {
                const data = snap.val();
                if(!data) return document.getElementById('interaction-panel').classList.add('hidden');
                if(data.type === "question") {
                    document.getElementById('question-text').innerText = `${data.fromName} soruyor!`;
                    document.getElementById('interaction-panel').classList.remove('hidden');
                    currentRequestId = data.fromId;
                } else if(data.type === "answer") {
                    showAlert("CEVAP", `${data.fromName}: "Ensendeki ${data.choice}"`);
                    db.ref('interactions/' + myId).remove();
                }
            });
        }

        function ask(tid, tname) {
            db.ref('interactions/' + tid).set({ fromId: myId, fromName: myName, type: "question" });
            updateLog(`${tname} kişisine soruldu.`);
        }

        function answerQuestion(choice) {
            db.ref('interactions/' + currentRequestId).set({ fromId: myId, fromName: myName, type: "answer", choice: choice });
            db.ref('interactions/' + myId).remove();
        }

        function assignSymbol() {
            db.ref('players/' + myId + '/symbol').once('value', s => {
                if(!s.val()) db.ref('players/' + myId).update({ symbol: ['♠','♥','♦','♣'][Math.floor(Math.random()*4)] });
            });
        }

        function setReady() { db.ref('players/' + myId).update({ ready: true }); }

        function makeGuess(g) {
            db.ref('players/' + myId + '/symbol').once('value', s => {
                if(s.val() === g) {
                    showAlert("TEBRİKLER", "Bildin!", () => location.reload());
                } else {
                    showAlert("ELENDİN", "Yanlış tahmin!", () => location.reload());
                }
            });
        }

        function updateLog(m) { document.getElementById('game-log').innerHTML += `<div>> ${m}</div>`; }
    </script>
</body>
</html>
